models:
  LogisticRegression:
    class_name: LogisticRegression
    module: sklearn.linear_model
    best_params:
      C: 100
      class_weight: 'balanced'
      l1_ratio: 0.5
      max_iter: 2000
      penalty: 'l1'
      solver: 'saga'

  RandomForestClassifier:
    class_name: RandomForestClassifier
    module: sklearn.ensemble    
    best_params:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 5
      class_weight: 'balanced'